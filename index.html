<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyatt Applicant Portal</title>
    
    <!-- Google Fonts matches the Application Portal style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #c5a880;
            --accent-gold-hover: #b39369;
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

       body {
    background:
        linear-gradient(rgba(8, 15, 30, 0.75), rgba(8, 15, 30, 0.75)),
        url("https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
        header {
            padding: 20px;
            background: transparent;
        }

        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid var(--card-border);
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
            display: inline-block;
        }

        .back-btn:hover {
            background: var(--accent-gold);
            color: #0f172a;
            border-color: var(--accent-gold);
        }

        .hero {
            text-align: center;
            padding: 30px 20px 15px 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .hero p {
            font-size: 0.95rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
        }

        .gold-line {
            height: 1px;
            background: var(--card-border);
            max-width: 650px;
            margin: 15px auto 0 auto;
            width: 90%;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid var(--card-border);
            background: rgba(0, 0, 0, 0.15);
            padding: 4px;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 14px;
            cursor: pointer;
            background: transparent;
            font-weight: 600;
            color: var(--text-muted);
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: 0.95rem;
        }

        .active {
            background: var(--accent-gold);
            color: #0f172a !important;
        }

        .form {
            display: block;
        }

        .hidden {
            display: none;
        }

        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.05);
        }

        input::placeholder {
            color: rgba(248, 250, 252, 0.3);
        }

        select option {
            background: #1e293b;
            color: var(--text-primary);
        }

        button {
            width: 100%;
            margin-top: 35px;
            padding: 16px;
            border: none;
            border-radius: 35px;
            background: var(--accent-gold);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-1px);
        }

       .message {
    margin-top: 25px;
    text-align: center;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--accent-gold);
}

.logo {
    width: 200px;
    display: block;
    margin: 0 auto 15px;
}

@media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>



   <div class="hero">
    <img src="https://i.postimg.cc/NM4y2YHW/images-1.png" class="logo" alt="Hyatt Logo">

    <h1>WELCOME TO HYATT </h1>
    <p> Hyatt Regency Hotel Rochester</p>
</div>
    <div class="gold-line"></div>

    <div class="container">
        <div class="card">
            
            <div class="tabs">
                <div id="loginTab" class="tab active" onclick="showLogin()">Login</div>
                <div id="registerTab" class="tab" onclick="showRegister()">Register</div>
            </div>

            <!-- Login Form -->
            <div id="loginForm" class="form">
                <label>Email Address</label>
                <input type="email" id="loginEmail" placeholder="Enter your email address">

                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="Enter your password">

                <button id="loginBtn">LOGIN</button>
            </div>

            <!-- Registration Form -->
            <div id="registerForm" class="hidden">
                <label>Full Name</label>
                <input type="text" id="fullName" placeholder="Enter your full name">

                <label>Phone Number</label>
                <input type="tel" id="phone" placeholder="Enter your phone number">

                <label>Country</label>
                <input type="text" id="country" placeholder="Enter your country">

                <label>Email Address</label>
                <input type="email" id="email" placeholder="Enter your email address">

                <label>Gender</label>
                <select id="gender">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Prefer not to say">Prefer not to say</option>
                </select>

                <label>Level of Education</label>
                <select id="education">
                    <option value="">Select Level of Education</option>
                    <option>High School</option>
                    <option>Certificate</option>
                    <option>Diploma</option>
                    <option>Bachelor's Degree</option>
                    <option>Master's Degree</option>
                    <option>Doctorate (PhD)</option>
                    <option>Other</option>
                </select>

                <label>Occupation</label>
                <select id="occupation">
                    <option value="">Select Occupation</option>
                    <option>Student</option>
                    <option>Hospitality</option>
                    <option>Healthcare</option>
                    <option>Education</option>
                    <option>Engineering</option>
                    <option>Information Technology</option>
                    <option>Business</option>
                    <option>Government</option>
                    <option>Self Employed</option>
                    <option>Other</option>
                </select>

                <label>Create Password</label>
                <input type="password" id="password" placeholder="Create a password">

                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password">

                <button id="registerBtn">CREATE ACCOUNT</button>
            </div>

            <div class="message" id="message"></div>

        </div>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCsZbX8doOr6DxT7C9p8SK6YReKKlyVcNI",
        authDomain: "hyatt-regency-afc7e.firebaseapp.com",
        projectId: "hyatt-regency-afc7e",
        storageBucket: "hyatt-regency-afc7e.firebasestorage.app",
        messagingSenderId: "636460619228",
        appId: "1:636460619228:web:5734324ff28ca738f4eb19",
        measurementId: "G-K5KTLSKDRN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Switch Forms
    window.showLogin = function(){
        document.getElementById("loginForm").classList.remove("hidden");
        document.getElementById("registerForm").classList.add("hidden");
        document.getElementById("loginTab").classList.add("active");
        document.getElementById("registerTab").classList.remove("active");
        document.getElementById("message").innerHTML = ""; 
    }

    window.showRegister = function(){
        document.getElementById("registerForm").classList.remove("hidden");
        document.getElementById("loginForm").classList.add("hidden");
        document.getElementById("registerTab").classList.add("active");
        document.getElementById("loginTab").classList.remove("active");
        document.getElementById("message").innerHTML = ""; 
    }

    const message = document.getElementById("message");

    // FAST REGISTER LOGIC
    document.getElementById("registerBtn").onclick = async() => {
        const fullName = document.getElementById("fullName").value;
        const phone = document.getElementById("phone").value;
        const country = document.getElementById("country").value;
        const email = document.getElementById("email").value;
        const gender = document.getElementById("gender").value;
        const education = document.getElementById("education").value;
        const occupation = document.getElementById("occupation").value;
        const password = document.getElementById("password").value;
        const confirm = document.getElementById("confirmPassword").value;

        // Red for missing fields
        if(!fullName || !email || !password) {
            message.innerHTML = "<span style='color: #f87171;'>Please fill out the required fields.</span>";
            return;
        }

        // Red for password mismatch
        if(password !== confirm){
            message.innerHTML = "<span style='color: #f87171;'>Passwords do not match.</span>";
            return;
        }

        // Green for active processing
        message.innerHTML = "<span style='color: #4ade80;'>Creating your account...</span>";

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);

            // This now automatically injects the personalized fields for every new account
            await setDoc(doc(db, "Applicants", userCredential.user.uid), {
                fullName,
                phone,
                country,
                email,
                gender,
                education,
                occupation,
                createdAt: new Date().toISOString(),
                applicationStatus: "No application found",
                applicationCode: "",
                dateApplied: "",
                viewAppLink: "",
                
                // AUTOMATED FIELDS:
                infoMessage: `DEAR ${fullName.toUpperCase()},THE INFORMATION REGARDING YOUR APPLICATION WILL BE GIVEN IN THIS SECTION.`,
                infoLink: "" // Starts empty so you can add their specific tracking links later
            });

            // Green for success
            message.innerHTML = "<span style='color: #4ade80;'>Account Created!</span>";

            setTimeout(() => {
                showLogin();
                document.getElementById("loginEmail").value = email;
                document.getElementById("loginPassword").value = "";
                message.innerHTML = ""; 
            }, 700);

        } catch (error) {
            // Red for account registration errors
            if (error.code === "auth/weak-password") {
                message.innerHTML = "<span style='color: #f87171;'>Password should be at least 6 characters.</span>";
            } else if (error.code === "auth/email-already-in-use") {
                message.innerHTML = "<span style='color: #f87171;'>Email already exists. Switching to login...</span>";
                setTimeout(() => {
                    showLogin();
                    document.getElementById("loginEmail").value = email;
                    document.getElementById("loginPassword").value = "";
                }, 1200);
            } else {
                message.innerHTML = "<span style='color: #f87171;'>Registration failed. Try again.</span>";
            }
        }
    };

    // FAST LOGIN LOGIC
    document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        // Red for missing inputs
        if(!email || !password) {
            message.innerHTML = "<span style='color: #f87171;'>Please enter both email and password.</span>";
            return;
        }

        // Green for active processing
        message.innerHTML = "<span style='color: #4ade80;'>Authenticating...</span>";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const userDoc = await getDoc(doc(db, "Applicants", userCredential.user.uid));

            if (userDoc.exists()) {
                const userData = userDoc.data();
                localStorage.setItem("loggedInUser", JSON.stringify({
                    fullName: userData.fullName
                }));
            }
            
            // Green for success
            message.innerHTML = "<span style='color: #4ade80;'>Access Granted! Loading Portal...</span>";
            
            window.location.href = "dashboard.html";

        } catch(error) {
            // Red for wrong credential inputs
            if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password") {
                message.innerHTML = "<span style='color: #f87171;'>Incorrect email or password.</span>";
            } else if (error.code === "auth/invalid-email") {
                message.innerHTML = "<span style='color: #f87171;'>Please enter a valid email address.</span>";
            } else {
                message.innerHTML = "<span style='color: #f87171;'>Login failed. Please try again.</span>";
            }
        }
    };
</script>
    </body>
</html>

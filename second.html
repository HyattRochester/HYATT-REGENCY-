<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hyatt Applicant Portal</title>
    
    <!-- Google Fonts matches the Application Portal style -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-muted: #94a3b8;
            --accent-gold: #c5a880;
            --accent-gold-hover: #b39369;
            --input-bg: rgba(255, 255, 255, 0.02);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

       body {
    background:
        linear-gradient(rgba(8, 15, 30, 0.75), rgba(8, 15, 30, 0.75)),
        url("https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1600&q=80");
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
        header {
            padding: 20px;
            background: transparent;
        }

        .back-btn {
            color: var(--text-primary);
            text-decoration: none;
            border: 1px solid var(--card-border);
            padding: 10px 22px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            background: rgba(255, 255, 255, 0.02);
            transition: all 0.2s ease;
            display: inline-block;
        }

        .back-btn:hover {
            background: var(--accent-gold);
            color: #0f172a;
            border-color: var(--accent-gold);
        }

        .hero {
            text-align: center;
            padding: 30px 20px 15px 20px;
        }

        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            letter-spacing: -0.01em;
            margin-bottom: 0.5rem;
            color: var(--text-primary);
        }

        .hero p {
            font-size: 0.95rem;
            color: var(--accent-gold);
            text-transform: uppercase;
            letter-spacing: 0.12em;
            font-weight: 500;
        }

        .gold-line {
            height: 1px;
            background: var(--card-border);
            max-width: 650px;
            margin: 15px auto 0 auto;
            width: 90%;
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 20px auto 40px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

       

        label {
            display: block;
            margin-top: 20px;
            margin-bottom: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, select {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid var(--card-border);
            background: var(--input-bg);
            border-radius: 12px;
            font-size: 15px;
            color: var(--text-primary);
            transition: all 0.2s ease;
            outline: none;
        }

        input:focus, select:focus {
            border-color: var(--accent-gold);
            background: rgba(255, 255, 255, 0.05);
        }

        input::placeholder {
            color: rgba(248, 250, 252, 0.3);
        }

        select option {
            background: #1e293b;
            color: var(--text-primary);
        }

        button {
            width: 100%;
            margin-top: 35px;
            padding: 16px;
            border: none;
            border-radius: 35px;
            background: var(--accent-gold);
            color: #0f172a;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 0.05em;
            transition: all 0.2s ease;
        }

        button:hover {
            background: var(--accent-gold-hover);
            transform: translateY(-1px);
        }

       .message {
    margin-top: 25px;
    text-align: center;
    font-weight: 600;
    font-size: 0.95rem;
    color: var(--accent-gold);
}

.logo {
    width: 200px;
    display: block;
    margin: 0 auto 15px;
}

@media (max-width: 480px) {
            .card {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>

<header>
    <a href="dashboard.html" class="back-btn">← Back</a>
</header>

   <div class="hero">
    <img src="https://i.postimg.cc/NM4y2YHW/images-1.png" class="logo" alt="Hyatt Logo">

    <h1> HYATT LOGIN PAGE </h1>
    <p> Hyatt Regency Hotel Rochester</p>
</div>
    <div class="gold-line"></div>

    <div class="container">
        <div class="card">
            
           
            <!-- Login Form -->
           <div id="loginForm" class="form">
    <label>Email Address</label>
    <input type="email" id="loginEmail" placeholder="Enter your email address">

    <label>Password</label>
    <input type="password" id="loginPassword" placeholder="Enter your password">

    <button id="loginBtn">LOGIN</button>

    <div class="message" id="message"></div>
</div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    const firebaseConfig = {
        apiKey: "AIzaSyCsZbX8doOr6DxT7C9p8SK6YReKKlyVcNI",
        authDomain: "hyatt-regency-afc7e.firebaseapp.com",
        projectId: "hyatt-regency-afc7e",
        storageBucket: "hyatt-regency-afc7e.firebasestorage.app",
        messagingSenderId: "636460619228",
        appId: "1:636460619228:web:5734324ff28ca738f4eb19",
        measurementId: "G-K5KTLSKDRN"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

        const message = document.getElementById("message");

   
    // FAST LOGIN LOGIC
    document.getElementById("loginBtn").onclick = async () => {
        const email = document.getElementById("loginEmail").value.trim();
        const password = document.getElementById("loginPassword").value;

        // Red for missing inputs
        if(!email || !password) {
            message.innerHTML = "<span style='color: #f87171;'>Please enter both email and password.</span>";
            return;
        }

        // Green for active processing
        message.innerHTML = "<span style='color: #4ade80;'>Authenticating...</span>";

        try {
            const userCredential = await signInWithEmailAndPassword(auth, email, password);
            const userDoc = await getDoc(doc(db, "Applicants", userCredential.user.uid));

            if (userDoc.exists()) {
                const userData = userDoc.data();
                localStorage.setItem("loggedInUser", JSON.stringify({
                    fullName: userData.fullName
                }));
            }
            
            // Green for success
            message.innerHTML = "<span style='color: #4ade80;'>Access Granted! Loading Portal...</span>";
            
            window.location.href = "portal.html";

        } catch(error) {
            // Red for wrong credential inputs
            if (error.code === "auth/invalid-credential" || error.code === "auth/wrong-password") {
                message.innerHTML = "<span style='color: #f87171;'>Incorrect email or password.</span>";
            } else if (error.code === "auth/invalid-email") {
                message.innerHTML = "<span style='color: #f87171;'>Please enter a valid email address.</span>";
            } else {
                message.innerHTML = "<span style='color: #f87171;'>Login failed. Please try again.</span>";
            }
        }
    };
</script>
    </body>
</html>
